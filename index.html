<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📊 퀀트 백테스팅 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.35.2/plotly.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 32px;
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }
    header h1 { font-size: 1.8rem; font-weight: 700; }
    header p  { font-size: 0.95rem; opacity: 0.85; margin-top: 4px; }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px;
      margin: 24px auto;
      max-width: 1100px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .ticker-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.85rem; font-weight: 600; color: #718096; }
    .input-group input {
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    .input-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-label {
      padding: 8px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      user-select: none;
    }
    .radio-label.selected {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }
    .run-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .run-btn:hover  { opacity: 0.92; transform: translateY(-1px); }
    .run-btn:active { opacity: 0.85; transform: translateY(0); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #loading { display: none; text-align: center; padding: 36px; color: #667eea; }
    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ticker-progress { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
    .ticker-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.9rem; color: #4a5568;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e2e8f0; flex-shrink: 0;
    }
    .status-dot.loading { background: #667eea; animation: pulse 1s infinite; }
    .status-dot.ok      { background: #48bb78; }
    .status-dot.cached  { background: #4299e1; }
    .status-dot.err     { background: #fc8181; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #result-card { display: none; }
    #chart { width: 100%; height: 520px; }

    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; margin-top: 8px; }
    .summary-table th {
      background: #f7fafc; color: #4a5568; font-weight: 700;
      padding: 10px 14px; text-align: left; border-bottom: 2px solid #e2e8f0;
    }
    .summary-table td { padding: 10px 14px; border-bottom: 1px solid #f0f4f8; }
    .summary-table tr:hover td { background: #f7fafc; }
    .positive { color: #e53e3e; font-weight: 700; }
    .negative { color: #3182ce; font-weight: 700; }

    #error-msg {
      display: none;
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      border-radius: 10px;
      padding: 14px 18px;
      color: #c53030;
      font-size: 0.95rem;
      margin-top: 16px;
    }
    .ticker-error {
      background: #fffbeb;
      border: 1px solid #f6ad55;
      border-radius: 8px;
      padding: 8px 12px;
      color: #744210;
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .hint { font-size: 0.78rem; color: #a0aec0; margin-top: 4px; }
    .source-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge-local { background: #c6f6d5; color: #22543d; }
    .badge-api   { background: #bee3f8; color: #2a4365; }

    @media (max-width: 700px) {
      .ticker-row   { grid-template-columns: 1fr; }
      .settings-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 퀀트 백테스팅 대시보드</h1>
  <p>GitHub Pages 기반 · 서버 불필요 · 매일 자동 업데이트</p>
</header>

<div class="card">
  <div class="section-title">🔍 종목 입력</div>
  <div class="ticker-row">
    <div class="input-group">
      <label>종목 1</label>
      <input id="t1" type="text" value="엔비디아" placeholder="예: 엔비디아, AAPL" />
      <div class="hint">한글 종목명 또는 영문 티커</div>
    </div>
    <div class="input-group">
      <label>종목 2</label>
      <input id="t2" type="text" value="삼성전자" placeholder="예: 삼성전자, 005930" />
      <div class="hint">한국주식: 이름 또는 6자리 숫자</div>
    </div>
    <div class="input-group">
      <label>종목 3</label>
      <input id="t3" type="text" value="나스닥2배" placeholder="예: 나스닥2배, QLD" />
      <div class="hint">비워두면 2종목만 비교</div>
    </div>
  </div>

  <div class="section-title">⚙️ 투자 설정</div>
  <div class="settings-row">
    <div class="input-group">
      <label>총 투자금액 (원화 ₩)</label>
      <input id="krw" type="number" value="100000000" step="1000000" min="1000000" />
    </div>
    <div class="input-group">
      <label>시작일</label>
      <input id="from_date" type="date" value="2015-01-01" />
    </div>
    <div class="input-group">
      <label>종료일</label>
      <input id="to_date" type="date" />
    </div>
    <div class="input-group">
      <label>환율 (KRW/USD)</label>
      <input id="fx" type="number" value="1500" step="10" min="500" max="3000" />
    </div>
  </div>

  <div class="section-title" style="margin-bottom:10px;">💼 투자 방식</div>
  <div class="radio-group" style="margin-bottom:20px;">
    <label class="radio-label selected" data-val="lump" onclick="selectStrategy(this)">거치식 (첫날 전액 투자)</label>
    <label class="radio-label"          data-val="dca"  onclick="selectStrategy(this)">적립식 (매일 분할 투자)</label>
  </div>

  <button class="run-btn" id="run-btn" onclick="runBacktest()">🚀 백테스팅 실행</button>
  <div id="error-msg"></div>
</div>

<div class="card" id="loading">
  <div class="spinner"></div>
  <div id="loading-text" style="font-size:1.05rem;font-weight:600;">데이터를 불러오는 중...</div>
  <div id="ticker-progress"></div>
</div>

<div class="card" id="result-card">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <div class="section-title" style="margin-bottom:0;">📈 백테스팅 결과</div>
    <div id="data-source-info" style="font-size:0.82rem;color:#718096;"></div>
  </div>
  <div id="ticker-errors"></div>
  <div id="chart"></div>
  <div style="margin-top:24px;">
    <div class="section-title">📋 종목별 요약</div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>종목</th><th>소스</th><th>시작가</th><th>최종가</th>
          <th>기간</th><th>최종 평가금 ($)</th><th>투입 원금 ($)</th><th>수익률</th>
        </tr>
      </thead>
      <tbody id="summary-body"></tbody>
    </table>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  종목명 변환 사전 (한글 -> 야후 티커)
// ════════════════════════════════════════════════════════
const DICT = {
  "애플": "AAPL", "마이크로소프트": "MSFT", "마소": "MSFT", "엔비디아": "NVDA", 
  "알파벳": "GOOGL", "구글": "GOOGL", "아마존": "AMZN", "메타": "META", "페이스북": "META",
  "테슬라": "TSLA", "브로드컴": "AVGO", "코스트코": "COST", "넷플릭스": "NFLX", 
  "AMD": "AMD", "암드": "AMD", "펩시": "PEP", "코카콜라": "KO", "시스코": "CSCO", 
  "어도비": "ADBE", "인텔": "INTC", "퀄컴": "QCOM", "ASML": "ASML", "TSMC": "TSM",
  "월마트": "WMT", "스타벅스": "SBUX", "디즈니": "DIS", "오라클": "ORCL", "우버": "UBER",

  "나스닥": "QQQ", "나스닥1배": "QQQ", "나스닥2배": "QLD", "나스닥3배": "TQQQ",
  "S&P500": "SPY", "SPY": "SPY", "VOO": "VOO", "IVV": "IVV", "다우": "DIA",
  "반도체": "SOXX", "반도체3배": "SOXL", "배당": "SCHD", "러셀2000": "IWM",

  "삼성전자": "005930.KS", "삼전": "005930.KS", "SK하이닉스": "000660.KS", "하이닉스": "000660.KS",
  "LG에너지솔루션": "373220.KS", "엔솔": "373220.KS", "삼성바이오로직스": "207940.KS", "삼바": "207940.KS",
  "현대차": "005380.KS", "기아": "000270.KS", "셀트리온": "068270.KS", "POSCO홀딩스": "005490.KS", 
  "포스코": "005490.KS", "KB금융": "105560.KS", "네이버": "035420.KS", "NAVER": "035420.KS", 
  "삼성물산": "028260.KS", "삼성SDI": "006400.KS", "신한지주": "055550.KS", "카카오": "035720.KS",
  "LG화학": "051910.KS", "현대모비스": "012330.KS", "포스코퓨처엠": "003670.KS", "하나금융지주": "086790.KS",
  "에코프로비엠": "247540.KQ", "에코프로": "086520.KQ"
};

function getRealTicker(raw) {
  let clean = raw.trim().replace(/ /g, "").toUpperCase();
  let ticker = DICT[clean] || clean;
  if (/^\d{6}$/.test(ticker)) ticker += ".KS"; // 6자리 숫자는 코스피로 인식
  return ticker;
}

// ════════════════════════════════════════════════════════
//  설정 및 유틸
// ════════════════════════════════════════════════════════
const DATA_BASE = './data/';
let currentStrategy = 'lump';
const CACHE = {};
const LOCAL_EXISTS = {};
document.getElementById('to_date').value = new Date().toISOString().slice(0, 10);

async function fetchWithTimeout(url, timeoutMs = 8000, options = {}) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: ctrl.signal });
    clearTimeout(timer);
    return res;
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

function selectStrategy(el) {
  document.querySelectorAll('.radio-label').forEach(l => l.classList.remove('selected'));
  el.classList.add('selected');
  currentStrategy = el.dataset.val;
}

const statusEls = {};
function initProgress(tickers) {
  const container = document.getElementById('ticker-progress');
  container.innerHTML = '';
  tickers.forEach(t => {
    const row = document.createElement('div');
    row.className = 'ticker-status';
    row.innerHTML = `<div class="status-dot loading" id="dot-${t}"></div><span id="msg-${t}">${t}: 로딩 중...</span>`;
    container.appendChild(row);
    statusEls[t] = { dot: row.querySelector(`#dot-${t}`), msg: row.querySelector(`#msg-${t}`) };
  });
}
function setStatus(ticker, state, text) {
  const el = statusEls[ticker];
  if (!el) return;
  el.dot.className = `status-dot ${state}`;
  el.msg.textContent = `${ticker}: ${text}`;
}

// ════════════════════════════════════════════════════════
//  데이터 로드 로직 (로컬 JSON -> 야후 API 프록시)
// ════════════════════════════════════════════════════════
async function tryLocalJSON(ticker, fromDate, toDate) {
  if (LOCAL_EXISTS[ticker] === false) return null;
  try {
    const res = await fetchWithTimeout(`${DATA_BASE}${ticker}.json`, 5000, { cache: 'default' });
    if (!res.ok) { LOCAL_EXISTS[ticker] = false; return null; }
    const payload = await res.json();
    LOCAL_EXISTS[ticker] = true;
    const filtered = payload.data.filter(d => d.date >= fromDate && d.date <= toDate);
    if (filtered.length < 2) return null;
    return { series: filtered, source: 'local', updated: payload.updated };
  } catch (e) {
    LOCAL_EXISTS[ticker] = false;
    return null;
  }
}

function buildYahooUrl(ticker, startDate, endDate) {
  const p1 = Math.floor(new Date(startDate).getTime() / 1000);
  const p2 = Math.floor(new Date(endDate).getTime() / 1000) + 86400;
  return `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&period1=${p1}&period2=${p2}&events=div,splits&includeAdjustedClose=true`;
}

function parseYahooResponse(data) {
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error('결과 없음');
  const timestamps = result.timestamp;
  const adjClose = result.indicators?.adjclose?.[0]?.adjclose || result.indicators?.quote?.[0]?.close;
  if (!timestamps || !adjClose) throw new Error('데이터 필드 없음');
  return timestamps
    .map((ts, i) => ({ date: new Date(ts * 1000).toISOString().slice(0, 10), close: adjClose[i] }))
    .filter(d => d.close != null && !isNaN(d.close) && d.close > 0);
}

async function tryProxy(proxyUrl, timeoutMs) {
  const res = await fetchWithTimeout(proxyUrl, timeoutMs);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  let data;
  try {
    const outer = JSON.parse(text);
    data = outer.contents ? JSON.parse(outer.contents) : outer;
  } catch {
    throw new Error('JSON 파싱 실패');
  }
  return parseYahooResponse(data);
}

async function fetchYahooAPI(ticker, startDate, endDate) {
  const yahooUrl = buildYahooUrl(ticker, startDate, endDate);
  const PROXIES = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yahooUrl)}`,
  ];
  return new Promise((resolve, reject) => {
    let settled = false;
    let failCount = 0;
    PROXIES.forEach(proxyUrl => {
      tryProxy(proxyUrl, 10000)
        .then(series => {
          if (!settled && series.length >= 2) { settled = true; resolve(series); }
        })
        .catch(() => {
          failCount++;
          if (failCount === PROXIES.length && !settled) {
            reject(new Error(`${ticker}: 모든 프록시 서버 응답 실패`));
          }
        });
    });
  });
}

async function loadTicker(ticker, fromDate, toDate) {
  const cacheKey = `${ticker}|${fromDate}|${toDate}`;
  if (CACHE[cacheKey]) {
    setStatus(ticker, 'cached', `캐시에서 즉시 로드 ✅`);
    return CACHE[cacheKey];
  }
  
  setStatus(ticker, 'loading', '로컬 데이터 확인 중...');
  const local = await tryLocalJSON(ticker, fromDate, toDate);
  if (local) {
    CACHE[cacheKey] = local;
    setStatus(ticker, 'ok', `로컬 캐시 로드 완료 ✅`);
    return local;
  }
  
  setStatus(ticker, 'loading', '야후 파이낸스 실시간 연결 중...');
  try {
    const series = await fetchYahooAPI(ticker, fromDate, toDate);
    const result = { series, source: 'api', updated: new Date().toISOString().slice(0, 10) };
    CACHE[cacheKey] = result;
    setStatus(ticker, 'ok', `실시간 로드 완료 ✅`);
    return result;
  } catch (e) {
    setStatus(ticker, 'err', `실패 ❌ — ${e.message}`);
    throw e;
  }
}

// ════════════════════════════════════════════════════════
//  백테스트 계산 로직
// ════════════════════════════════════════════════════════
function calcLumpSum(series, totalUsd) {
  const p0 = series[0].close;
  const shares = totalUsd / p0;
  return series.map(d => {
    const portfolio = shares * d.close;
    return { date: d.date, portfolio, invested: totalUsd, roi: (portfolio / totalUsd - 1) * 100 };
  });
}

function calcDCA(series, totalUsd) {
  const n = series.length;
  const daily = totalUsd / n;
  let cumShares = 0;
  return series.map((d, i) => {
    cumShares += daily / d.close;
    const portfolio = cumShares * d.close;
    const invested = daily * (i + 1);
    return { date: d.date, portfolio, invested, roi: (portfolio / invested - 1) * 100 };
  });
}

// ════════════════════════════════════════════════════════
//  메인 실행
// ════════════════════════════════════════════════════════
async function runBacktest() {
  const rawInputs = ['t1','t2','t3']
    .map(id => document.getElementById(id).value.trim())
    .filter(t => t !== '');
    
  // 입력한 한글/숫자를 변환 사전을 거쳐 실제 티커로 맵핑
  const targetData = rawInputs.map(raw => ({
    rawName: raw,
    ticker: getRealTicker(raw)
  }));

  const krw = parseFloat(document.getElementById('krw').value) || 100_000_000;
  const fx = parseFloat(document.getElementById('fx').value) || 1500;
  const fromDate = document.getElementById('from_date').value;
  const toDate = document.getElementById('to_date').value;
  const totalUsd = krw / fx;

  if (targetData.length === 0) return showError('종목을 하나 이상 입력해주세요.');
  if (!fromDate || !toDate || fromDate >= toDate) return showError('시작일이 종료일보다 이전이어야 합니다.');

  hideError();
  document.getElementById('ticker-errors').innerHTML = '';
  initProgress(targetData.map(t => t.ticker));
  showLoading(true, `${targetData.map(t => t.rawName).join(', ')} 데이터를 가져오고 있습니다...`);
  document.getElementById('run-btn').disabled = true;
  document.getElementById('result-card').style.display = 'none';

  try {
    // 맵핑된 실제 영문/한국 티커를 바탕으로 데이터 호출
    const settled = await Promise.allSettled(
      targetData.map(t => loadTicker(t.ticker, fromDate, toDate))
    );

    const failedTickers = [];
    const traces = [];
    const summaryRows = [];
    const COLORS = ['#667eea','#f6ad55','#68d391','#fc8181','#76e4f7'];
    let principalDates = null, principalInvested = null, maxLen = 0;
    const sourceLabels = [];

    settled.forEach((s, i) => {
      const { rawName, ticker } = targetData[i];

      if (s.status === 'rejected') {
        failedTickers.push({ ticker: rawName, reason: s.reason?.message || '알 수 없는 오류' });
        return;
      }

      const res = s.value;
      if (!res || res.series.length < 2) {
        failedTickers.push({ ticker: rawName, reason: '해당 기간의 유효한 데이터가 없습니다.' });
        return;
      }

      const { series, source, updated } = res;
      sourceLabels.push({ ticker: rawName, source, updated });

      const calc = currentStrategy === 'lump' ? calcLumpSum(series, totalUsd) : calcDCA(series, totalUsd);
      const dates = calc.map(r => r.date);
      const portfolio = calc.map(r => r.portfolio);
      const invested = calc.map(r => r.invested);
      const roi = calc.map(r => r.roi);

      if (dates.length > maxLen) {
        maxLen = dates.length;
        principalDates = dates;
        principalInvested = invested;
      }

      const finalRoi = roi.at(-1);
      const finalVal = portfolio.at(-1);
      const finalInv = invested.at(-1);
      const fmt3 = n => Math.round(n).toLocaleString();

      traces.push({
        x: dates, y: portfolio,
        customdata: roi.map((r, j) => [r, invested[j]]),
        mode: 'lines',
        name: `${rawName} $${fmt3(finalVal)} (${finalRoi >= 0 ? '+' : ''}${finalRoi.toFixed(1)}%)`,
        hovertemplate: '<b>%{x}</b><br>평가금: $%{y:,.2f}<br>수익률: %{customdata[0]:,.2f}%<br>투입원금: $%{customdata[1]:,.2f}<extra></extra>',
        line: { width: 2.5, color: COLORS[i % COLORS.length] }
      });

      summaryRows.push({ 
        ticker: rawName, source, updated,
        startPrice: series[0].close, endPrice: series.at(-1).close,
        days: series.length, finalVal, finalInv, finalRoi 
      });
    });

    const errBox = document.getElementById('ticker-errors');
    errBox.innerHTML = failedTickers.map(f => `<div class="ticker-error">⚠️ <b>${f.ticker}</b>: ${f.reason}</div>`).join('');
    if (traces.length === 0) throw new Error('그릴 수 있는 유효한 데이터가 없습니다.');

    if (principalDates) {
      traces.push({
        x: principalDates, y: principalInvested,
        mode: 'lines', name: '투입 원금 (Principal)',
        hovertemplate: '<b>%{x}</b><br>누적 원금: $%{y:,.2f}<extra></extra>',
        line: { color: '#a0aec0', width: 1.8, dash: 'dash' }
      });
    }

    const stratLabel = currentStrategy === 'lump' ? '거치식' : '적립식';
    Plotly.newPlot('chart', traces, {
      title: {
        text: `<b>${fromDate} ~ ${toDate} ${stratLabel} 백테스팅</b><br>`
            + `<span style="font-size:13px;color:#718096;">총 원금: ₩${krw.toLocaleString()}`
            + ` (환율 ${fx}원 기준 → $${Math.round(totalUsd).toLocaleString()})</span>`,
        font: { size: 17 }
      },
      xaxis: { title: '날짜', showgrid: true, gridcolor: '#f0f4f8' },
      yaxis: { title: '평가금액 (USD $)', showgrid: true, gridcolor: '#f0f4f8' },
      hovermode: 'x unified',
      template: 'plotly_white',
      legend: { yanchor:'top', y:0.99, xanchor:'left', x:0.01, bgcolor:'rgba(255,255,255,0.85)', bordercolor:'#e2e8f0', borderwidth:1 },
      margin: { t:100, b:60, l:70, r:40 },
      paper_bgcolor: 'white', plot_bgcolor: 'white',
    }, { responsive: true, displayModeBar: true });

    document.getElementById('data-source-info').innerHTML = sourceLabels.map(s =>
      `${s.ticker}: <span class="source-badge ${s.source === 'local' ? 'badge-local' : 'badge-api'}">${s.source === 'local' ? '📦 사전캐시' : '🌐 실시간'}</span>`
    ).join(' ');

    const tbody = document.getElementById('summary-body');
    tbody.innerHTML = summaryRows.map(row => {
      const cls = row.finalRoi >= 0 ? 'positive' : 'negative';
      const sign = row.finalRoi >= 0 ? '+' : '';
      return `<tr>
        <td><b>${row.ticker}</b></td>
        <td><span class="source-badge ${row.source === 'local' ? 'badge-local' : 'badge-api'}">${row.source === 'local' ? '📦 사전캐시' : '🌐 실시간'}</span></td>
        <td>$${row.startPrice.toLocaleString(undefined, {maximumFractionDigits:4})}</td>
        <td>$${row.endPrice.toLocaleString(undefined,   {maximumFractionDigits:4})}</td>
        <td>${row.days.toLocaleString()}일</td>
        <td>$${row.finalVal.toLocaleString(undefined,  {maximumFractionDigits:0})}</td>
        <td>$${row.finalInv.toLocaleString(undefined,  {maximumFractionDigits:0})}</td>
        <td class="${cls}">${sign}${row.finalRoi.toFixed(2)}%</td>
      </tr>`;
    }).join('');

    document.getElementById('result-card').style.display = 'block';

  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
    document.getElementById('run-btn').disabled = false;
  }
}

function showLoading(on, msg = '') {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  if (msg) document.getElementById('loading-text').textContent = msg;
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.textContent = '⚠️ ' + msg;
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !document.getElementById('run-btn').disabled) runBacktest(); });
</script>
</body>
</html>
